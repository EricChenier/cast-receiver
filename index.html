<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TV Guide Cast Receiver</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
  </style>
</head>
<body>
  <video id="player" autoplay></video>

  <!-- hls.js for IPTV HLS stream support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <!-- Cast Receiver SDK v3 -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const MSG_NS = 'urn:x-cast:com.tvguide.log';
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('player');
    let hls = null;

    // Send log message back to sender (phone)
    function sendLog(msg, level) {
      level = level || 'info';
      try {
        context.sendCustomMessage(MSG_NS, undefined, { level: level, message: msg });
      } catch (e) { /* ignore if no sender connected */ }
    }

    // Register custom message namespace
    context.addCustomMessageListener(MSG_NS, function() {});

    function createHls() {
      return new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 10,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        startLevel: -1,
      });
    }

    function loadStream(url) {
      sendLog('Loading stream...');

      if (hls) { hls.destroy(); hls = null; }

      hls = createHls();
      let retryCount = 0;
      const maxRetries = 5;

      hls.on(Hls.Events.MANIFEST_LOADED, function(e, d) {
        var lvlCount = d.levels ? d.levels.length : 0;
        sendLog('Manifest loaded, ' + lvlCount + ' level(s)');
        if (d.levels) {
          d.levels.forEach(function(lvl, i) {
            var vc = lvl.codecSet || lvl.videoCodec || 'unknown';
            var ac = lvl.audioCodec || 'unknown';
            sendLog('Level ' + i + ': ' + (lvl.width || '?') + 'x' + (lvl.height || '?') + ' video=' + vc + ' audio=' + ac);
          });
        }
      });

      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        sendLog('Manifest parsed, starting playback');
        video.muted = false;
        video.play().then(function() {
          sendLog('Playing (unmuted)');
        }).catch(function() {
          video.muted = true;
          video.play().then(function() {
            sendLog('Playing (muted, will unmute)');
            setTimeout(function() { video.muted = false; sendLog('Unmuted'); }, 1500);
          }).catch(function(err) {
            sendLog('Play failed: ' + err.message, 'error');
          });
        });
      });

      hls.on(Hls.Events.BUFFER_CODECS, function(e, d) {
        var codecs = Object.keys(d).map(function(k) { return k + ':' + (d[k].codec || '?'); }).join(', ');
        sendLog('Codecs: ' + codecs);
      });

      var mediaRecoveryAttempt = 0;
      hls.on(Hls.Events.ERROR, function(event, data) {
        if (!data.fatal) return;

        var msg = data.type + '/' + data.details;
        if (data.reason) msg += ' (' + data.reason + ')';
        sendLog('Error: ' + msg, 'error');

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          retryCount++;
          if (retryCount <= maxRetries) {
            sendLog('Network retry ' + retryCount + '/' + maxRetries, 'warn');
            setTimeout(function() { hls.startLoad(); }, 1000 * retryCount);
          } else {
            sendLog('Max retries, rebuilding...', 'warn');
            retryCount = 0;
            loadStream(url);
          }
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          mediaRecoveryAttempt++;
          if (data.details === 'bufferAddCodecError') {
            if (mediaRecoveryAttempt === 1) {
              sendLog('Codec error — trying swapAudioCodec', 'warn');
              hls.swapAudioCodec();
              hls.recoverMediaError();
            } else {
              // Check if any H.264 level exists
              var levels = hls.levels || [];
              var found = false;
              for (var i = 0; i < levels.length; i++) {
                var vc = levels[i].videoCodec || levels[i].codecSet || '';
                if (vc.indexOf('avc') >= 0) {
                  hls.currentLevel = i;
                  hls.recoverMediaError();
                  found = true;
                  sendLog('Trying H.264 level ' + i, 'warn');
                  break;
                }
              }
              if (!found) {
                sendLog('UNSUPPORTED_CODEC: This channel uses HEVC which cannot be cast', 'error');
              }
            }
          } else {
            if (mediaRecoveryAttempt <= 3) {
              hls.recoverMediaError();
            } else {
              mediaRecoveryAttempt = 0;
              loadStream(url);
            }
          }
        }
      });

      hls.loadSource(url);
      hls.attachMedia(video);
    }

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      function(loadRequestData) {
        var url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;
        var ct = loadRequestData.media.contentType || '';

        var isHls = url && (
          url.includes('.m3u8') ||
          url.includes('/live/') ||
          ct.toLowerCase().includes('mpegurl')
        );

        if (!isHls || !Hls.isSupported()) return loadRequestData;

        sendLog('LOAD: ' + (url ? url.split('/').pop() : 'none'));
        loadStream(url);
        return null;
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      function(requestData) {
        sendLog('Stopped');
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        return requestData;
      }
    );

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
