<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TV Guide Cast Receiver</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
  </style>
</head>
<body>
  <video id="player" autoplay></video>

  <!-- hls.js for IPTV HLS stream support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <!-- Cast Receiver SDK v3 -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('player');
    let hls = null;

    function createHls() {
      return new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 10,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        startLevel: -1,
      });
    }

    function loadStream(url) {
      // Destroy previous instance
      if (hls) { hls.destroy(); hls = null; }

      hls = createHls();
      let retryCount = 0;
      const maxRetries = 5;

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.muted = false;
        video.play().catch(() => {
          // Autoplay blocked — start muted then unmute after a short delay
          video.muted = true;
          video.play().then(() => {
            setTimeout(() => { video.muted = false; }, 1500);
          }).catch(() => {});
        });
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (!data.fatal) return;

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          retryCount++;
          if (retryCount <= maxRetries) {
            // Exponential backoff retry
            setTimeout(() => hls.startLoad(), 1000 * retryCount);
          } else {
            // Rebuild HLS instance from scratch
            retryCount = 0;
            loadStream(url);
          }
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        }
      });

      hls.loadSource(url);
      hls.attachMedia(video);
    }

    // Intercept LOAD — hls.js handles all HLS playback directly.
    // Return null so CAF does NOT try to load the URL itself.
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;

        const isHls = url && (
          url.includes('.m3u8') ||
          url.includes('/live/') ||
          (loadRequestData.media.contentType || '').toLowerCase().includes('mpegurl')
        );

        if (!isHls || !Hls.isSupported()) return loadRequestData;

        loadStream(url);

        // Return null — we handle playback entirely via hls.js.
        return null;
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (requestData) => {
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        return requestData;
      }
    );

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
