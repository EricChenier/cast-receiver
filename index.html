<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TV Guide Cast Receiver</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #player { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
  </style>
</head>
<body>
  <video id="player" autoplay></video>

  <!-- hls.js for IPTV HLS stream support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <!-- Cast Receiver SDK v3 -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('player');
    let hls = null;

    // Tell the Cast framework to use our video element
    playerManager.setMediaElement(video);

    // Intercept LOAD requests — set up hls.js then return the request
    // so the Cast framework still tracks the media session properly
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;
        console.log('[Receiver] LOAD intercepted:', url);

        const isHls = url && (
          url.includes('.m3u8') ||
          (loadRequestData.media.contentType || '').toLowerCase().includes('mpegurl')
        );

        if (isHls && Hls.isSupported()) {
          // Destroy previous hls instance
          if (hls) { hls.destroy(); hls = null; }

          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 10,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            abrEwmaDefaultEstimate: 5000000,
            startLevel: -1,
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('[Receiver] HLS error:', data.type, data.details);
            if (data.fatal) {
              if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                hls.startLoad();
              } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                hls.recoverMediaError();
              }
            }
          });

          // Attach hls.js to the video element — it takes over via MSE
          hls.loadSource(url);
          hls.attachMedia(video);

          // Tell the Cast framework this uses MPEG-TS segments
          // so it doesn't try its own incompatible HLS parsing
          loadRequestData.media.hlsSegmentFormat =
            cast.framework.messages.HlsSegmentFormat.TS;
          loadRequestData.media.hlsVideoSegmentFormat =
            cast.framework.messages.HlsVideoSegmentFormat.MPEG2_TS;
        }

        // Return the request so the Cast framework tracks the media session
        // (handles play/pause/stop/status updates for the sender)
        return loadRequestData;
      }
    );

    // Clean up hls.js on stop
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (requestData) => {
        if (hls) { hls.destroy(); hls = null; }
        return requestData;
      }
    );

    // Start the receiver — disable idle timeout for live TV
    context.start({ disableIdleTimeout: true });
    console.log('[Receiver] TV Guide Cast Receiver started');
  </script>
</body>
</html>
