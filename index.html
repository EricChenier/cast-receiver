<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TV Guide Cast Receiver</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
  </style>
</head>
<body>
  <video id="player" autoplay></video>

  <!-- hls.js for IPTV HLS stream support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <!-- Cast Receiver SDK v3 -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('player');
    let hls = null;

    // Intercept LOAD — use hls.js for HLS streams, let CAF handle others
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;

        const isHls = url && (
          url.includes('.m3u8') ||
          url.includes('/live/') ||
          (loadRequestData.media.contentType || '').toLowerCase().includes('mpegurl')
        );

        if (!isHls || !Hls.isSupported()) return loadRequestData;

        if (hls) { hls.destroy(); hls = null; }

        return new Promise((resolve) => {
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 10,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            startLevel: -1,
          });

          let resolved = false;

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().then(() => {
              if (!resolved) {
                resolved = true;
                loadRequestData.media.contentUrl = '';
                loadRequestData.media.hlsSegmentFormat =
                  cast.framework.messages.HlsSegmentFormat.TS;
                loadRequestData.media.hlsVideoSegmentFormat =
                  cast.framework.messages.HlsVideoSegmentFormat.MPEG2_TS;
                resolve(loadRequestData);
              }
            }).catch(() => {
              video.muted = true;
              video.play().then(() => {
                if (!resolved) {
                  resolved = true;
                  loadRequestData.media.contentUrl = '';
                  resolve(loadRequestData);
                }
              }).catch(() => {
                if (!resolved) { resolved = true; resolve(loadRequestData); }
              });
            });
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
              else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
              else if (!resolved) { resolved = true; resolve(loadRequestData); }
            }
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          setTimeout(() => {
            if (!resolved) { resolved = true; resolve(loadRequestData); }
          }, 15000);
        });
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (requestData) => {
        if (hls) { hls.destroy(); hls = null; }
        return requestData;
      }
    );

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
